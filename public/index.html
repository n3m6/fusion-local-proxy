<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fusion Chat — Dev UI</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface-2: #222536;
        --border: #2e3148;
        --text: #e2e4f0;
        --text-muted: #7a7f9a;
        --accent: #6c63ff;
        --accent-hover: #5a52e0;
        --user-bubble: #1e2140;
        --assistant-bubble: #191c2e;
        --error: #ff6b6b;
        --status: #f0a500;
        --radius: 10px;
        --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
      }

      header h1 {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text);
      }

      header .badge {
        font-size: 0.7rem;
        background: var(--accent);
        color: #fff;
        border-radius: 4px;
        padding: 2px 7px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .model-row {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 8px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .model-row label {
        font-size: 0.8rem;
        color: var(--text-muted);
        white-space: nowrap;
      }

      .model-row select {
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 0.82rem;
        font-family: var(--mono);
        cursor: pointer;
        outline: none;
        flex: 1;
        max-width: 360px;
      }

      .model-row select:focus {
        border-color: var(--accent);
      }

      #status-bar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 5px 20px;
        font-size: 0.75rem;
        color: var(--status);
        font-family: var(--mono);
        min-height: 26px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: opacity 0.3s;
      }

      #status-bar.idle {
        opacity: 0;
      }

      #status-bar .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--status);
        animation: pulse 1s infinite;
        flex-shrink: 0;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      #thread {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scroll-behavior: smooth;
      }

      #thread:empty::before {
        content: 'Send a message to start a conversation.';
        color: var(--text-muted);
        font-size: 0.9rem;
        text-align: center;
        margin: auto;
      }

      .msg {
        display: flex;
        flex-direction: column;
        max-width: 760px;
        gap: 4px;
      }

      .msg.user {
        align-self: flex-end;
        align-items: flex-end;
      }

      .msg.assistant {
        align-self: flex-start;
        align-items: flex-start;
      }

      .msg .role-label {
        font-size: 0.72rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 600;
        padding: 0 4px;
      }

      .msg .bubble {
        padding: 12px 16px;
        border-radius: var(--radius);
        font-size: 0.9rem;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg.user .bubble {
        background: var(--user-bubble);
        border: 1px solid var(--border);
        border-bottom-right-radius: 3px;
      }

      .msg.assistant .bubble {
        background: var(--assistant-bubble);
        border: 1px solid var(--border);
        border-bottom-left-radius: 3px;
        font-family: var(--mono);
        font-size: 0.85rem;
      }

      .msg.assistant .bubble.streaming::after {
        content: '▍';
        animation: blink 0.8s step-end infinite;
        color: var(--accent);
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .msg .bubble.error-bubble {
        color: var(--error);
        border-color: var(--error);
        font-family: var(--mono);
        font-size: 0.82rem;
      }

      .input-area {
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 14px 20px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
        flex-shrink: 0;
      }

      #prompt {
        flex: 1;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 0.9rem;
        padding: 10px 14px;
        resize: none;
        outline: none;
        line-height: 1.5;
        max-height: 200px;
        overflow-y: auto;
        transition: border-color 0.15s;
      }

      #prompt:focus {
        border-color: var(--accent);
      }

      #prompt:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #send-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        padding: 10px 18px;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s;
        flex-shrink: 0;
        height: 42px;
      }

      #send-btn:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      #send-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      #clear-btn {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 14px;
        font-size: 0.82rem;
        cursor: pointer;
        white-space: nowrap;
        transition:
          color 0.15s,
          border-color 0.15s;
        flex-shrink: 0;
        height: 42px;
      }

      #clear-btn:hover {
        color: var(--text);
        border-color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Fusion Chat</h1>
      <span class="badge">Dev UI</span>
    </header>

    <div class="model-row">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="fusion">fusion</option>
      </select>
    </div>

    <div id="status-bar" class="idle">
      <span class="dot"></span>
      <span id="status-text"></span>
    </div>

    <div id="thread" role="log" aria-live="polite"></div>

    <div class="input-area">
      <textarea
        id="prompt"
        rows="1"
        placeholder="Ask something… (Enter to send, Shift+Enter for newline)"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="clear-btn" type="button" title="Clear conversation">Clear</button>
      <button id="send-btn" type="button">Send</button>
    </div>

    <script>
      'use strict';

      // -------------------------------------------------------------------------
      // State
      // -------------------------------------------------------------------------
      /** @type {Array<{role: string, content: string}>} */
      const messages = [];
      let streaming = false;

      // -------------------------------------------------------------------------
      // DOM refs
      // -------------------------------------------------------------------------
      const thread = /** @type {HTMLDivElement} */ (document.getElementById('thread'));
      const promptEl = /** @type {HTMLTextAreaElement} */ (document.getElementById('prompt'));
      const sendBtn = /** @type {HTMLButtonElement} */ (document.getElementById('send-btn'));
      const clearBtn = /** @type {HTMLButtonElement} */ (document.getElementById('clear-btn'));
      const modelSelect = /** @type {HTMLSelectElement} */ (
        document.getElementById('model-select')
      );
      const statusBar = /** @type {HTMLDivElement} */ (document.getElementById('status-bar'));
      const statusText = /** @type {HTMLSpanElement} */ (document.getElementById('status-text'));

      // -------------------------------------------------------------------------
      // Model picker — populated from GET /v1/models
      // -------------------------------------------------------------------------
      async function loadModels() {
        try {
          const res = await fetch('/v1/models');
          if (!res.ok) return;
          const data = await res.json();
          const models = data?.data;
          if (!Array.isArray(models) || models.length === 0) return;
          modelSelect.innerHTML = '';
          const seen = new Set();
          for (const m of models) {
            if (typeof m.id === 'string' && !seen.has(m.id)) {
              seen.add(m.id);
              const opt = document.createElement('option');
              opt.value = m.id;
              opt.textContent = m.id;
              modelSelect.appendChild(opt);
            }
          }
          // Add a generic "fusion" fallback option after real models
          const fallback = document.createElement('option');
          fallback.value = 'fusion';
          fallback.textContent = 'fusion (generic)';
          modelSelect.appendChild(fallback);
        } catch {
          // keep the default option
        }
      }

      // -------------------------------------------------------------------------
      // Status bar
      // -------------------------------------------------------------------------
      function setStatus(text) {
        statusText.textContent = text;
        statusBar.classList.remove('idle');
      }

      function clearStatus() {
        statusBar.classList.add('idle');
        statusText.textContent = '';
      }

      // -------------------------------------------------------------------------
      // Thread rendering
      // -------------------------------------------------------------------------
      function appendMessage(role, content) {
        const wrapper = document.createElement('div');
        wrapper.className = `msg ${role}`;

        const label = document.createElement('div');
        label.className = 'role-label';
        label.textContent = role;

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = content;

        wrapper.appendChild(label);
        wrapper.appendChild(bubble);
        thread.appendChild(wrapper);
        scrollToBottom();
        return bubble;
      }

      function appendErrorMessage(text) {
        const wrapper = document.createElement('div');
        wrapper.className = 'msg assistant';

        const label = document.createElement('div');
        label.className = 'role-label';
        label.textContent = 'error';

        const bubble = document.createElement('div');
        bubble.className = 'bubble error-bubble';
        bubble.textContent = text;

        wrapper.appendChild(label);
        wrapper.appendChild(bubble);
        thread.appendChild(wrapper);
        scrollToBottom();
      }

      function scrollToBottom() {
        thread.scrollTop = thread.scrollHeight;
      }

      // -------------------------------------------------------------------------
      // Auto-grow textarea
      // -------------------------------------------------------------------------
      promptEl.addEventListener('input', () => {
        promptEl.style.height = 'auto';
        promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + 'px';
      });

      // -------------------------------------------------------------------------
      // Send logic
      // -------------------------------------------------------------------------
      async function sendMessage() {
        const text = promptEl.value.trim();
        if (!text || streaming) return;

        // Add to thread + state
        messages.push({ role: 'user', content: text });
        appendMessage('user', text);
        promptEl.value = '';
        promptEl.style.height = 'auto';

        // Create the assistant bubble we'll stream into
        const assistantBubble = appendMessage('assistant', '');
        assistantBubble.classList.add('streaming');

        setStreaming(true);
        setStatus('sending…');

        try {
          const res = await fetch('/v1/chat/completions', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              model: modelSelect.value,
              messages: messages.slice(),
              stream: true,
            }),
          });

          if (!res.ok || !res.body) {
            const errText = await res.text();
            assistantBubble.classList.remove('streaming');
            assistantBubble.parentElement?.remove();
            appendErrorMessage(`HTTP ${res.status}: ${errText}`);
            return;
          }

          // Stream the SSE response
          let assistantContent = '';
          let errored = false;
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';

          outer: for (;;) {
            const { value, done } = await reader.read();
            // When done, flush any bytes held inside the TextDecoder; otherwise
            // pass { stream: true } so multi-byte sequences aren't split across chunks.
            buf += done ? decoder.decode() : decoder.decode(value, { stream: true });
            const frames = buf.split('\n\n');
            // When the stream is finished, treat every remaining frame as complete.
            // Otherwise keep the last (possibly incomplete) frame for the next iteration.
            buf = done ? '' : (frames.pop() ?? '');

            for (const frame of frames) {
              const trimmed = frame.trim();
              if (!trimmed) continue;

              // SSE comment lines carry ensemble progress info
              if (trimmed.startsWith(':')) {
                setStatus(trimmed.slice(1).trim());
                continue;
              }

              // Strip the "data: " prefix
              const line = trimmed.replace(/^data:\s*/, '');
              if (line === '[DONE]') break outer;

              let parsed;
              try {
                parsed = JSON.parse(line);
              } catch {
                continue;
              }

              // Surface error payloads
              if (parsed?.error) {
                errored = true;
                assistantBubble.classList.remove('streaming');
                assistantBubble.classList.add('error-bubble');
                assistantBubble.textContent = parsed.error.message ?? JSON.stringify(parsed.error);
                break outer;
              }

              const delta = parsed?.choices?.[0]?.delta?.content ?? '';
              if (delta) {
                assistantContent += delta;
                assistantBubble.textContent = assistantContent;
                scrollToBottom();
              }
            }

            if (done) break;
          }

          assistantBubble.classList.remove('streaming');

          // Only push to history on a successful, non-empty response. On error
          // the bubble shows the error message, so storing the partial content
          // would desync the visible UI from the conversation history.
          if (assistantContent && !errored) {
            messages.push({ role: 'assistant', content: assistantContent });
          }
        } catch (err) {
          assistantBubble.classList.remove('streaming');
          assistantBubble.parentElement?.remove();
          appendErrorMessage(err instanceof Error ? err.message : String(err));
        } finally {
          setStreaming(false);
          clearStatus();
        }
      }

      function setStreaming(on) {
        streaming = on;
        sendBtn.disabled = on;
        promptEl.disabled = on;
        clearBtn.disabled = on;
      }

      // -------------------------------------------------------------------------
      // Clear conversation
      // -------------------------------------------------------------------------
      clearBtn.addEventListener('click', () => {
        messages.length = 0;
        thread.innerHTML = '';
        clearStatus();
      });

      // -------------------------------------------------------------------------
      // Keyboard shortcut: Enter sends, Shift+Enter inserts newline
      // -------------------------------------------------------------------------
      promptEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      sendBtn.addEventListener('click', sendMessage);

      // -------------------------------------------------------------------------
      // Boot
      // -------------------------------------------------------------------------
      loadModels();
      promptEl.focus();
    </script>
  </body>
</html>
